
services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 — Base de Datos Principal
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sggi_postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sggi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sggi_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-sggi_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Script de inicialización: habilita extensiones necesarias
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sggi_admin} -d ${POSTGRES_DB:-sggi_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sggi_network

  # ──────────────────────────────────────────────
  # Redis 7 — Cache, Pub/Sub, Sesiones
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sggi_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sggi_network

  # ──────────────────────────────────────────────
  # pgAdmin 4 — Administración Visual de PostgreSQL
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sggi_pgadmin
    restart: unless-stopped
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sggi.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sggi_network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  pgadmindata:
    driver: local

networks:
  sggi_network:
    driver: bridge
