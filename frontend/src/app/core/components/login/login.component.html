<div class="login-wrapper">
  <!-- Decorative warm spheres -->
  <div class="glow-sphere sphere-1"></div>
  <div class="glow-sphere sphere-2"></div>
  <div class="glow-sphere sphere-3"></div>

  <div class="login-container glass-panel">
    <!-- Brand / Logo Area -->
    <div class="logo-area">
      <div class="logo-isotipo">T</div>
      <h1 class="brand-title">Tukuypaj</h1>
      <p class="brand-subtitle">Peña & Restaurant — Cochabamba</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="usuario&#64;tukuypaj.com"
          required
          [disabled]="loading()"
          autocomplete="email"
        />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
          [disabled]="loading()"
          autocomplete="current-password"
        />
      </div>

      <!-- Error message container -->
      @if (errorMessage()) {
        <div class="error-container">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <button type="submit" class="btn-primary login-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          <span>Ingresando...</span>
        } @else {
          <span>Ingresar al Sistema</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        }
      </button>
    </form>

    <!-- Footer sutil -->
    <div class="login-footer">
      <span>Sistema de Gestión Gastronómica</span>
    </div>
  </div>
</div>
