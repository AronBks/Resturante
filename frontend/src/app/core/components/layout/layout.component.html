<div class="app-layout">
  <!-- ═══════════════════════════════════════════
       SIDEBAR — Peña Tukuypaj Brand Shell
       ═══════════════════════════════════════════ -->
  <aside class="sidebar">
    <!-- Brand Header: Isotipo "T" + Nombre -->
    <div class="sidebar-header">
      <div class="brand-isotipo">T</div>
      <div class="brand-text">
        <h2>Tukuypaj</h2>
        <span>Peña & Restaurant</span>
      </div>
    </div>

    <!-- Separador decorativo con gradiente de marca -->
    <div class="sidebar-divider"></div>

    <!-- Navigation Links -->
    <nav class="sidebar-nav">
      @for (item of menuItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-link"
        >
          <span class="nav-icon">
            <lucide-icon [name]="item.iconName" class="icon-md"></lucide-icon>
          </span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- User Profile Footer -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="avatar">
          {{ user()?.nombre?.substring(0, 2) | uppercase }}
        </div>
        <div class="user-info">
          <h4>{{ user()?.nombre }}</h4>
          <span class="role-badge" [ngClass]="getRoleBadgeClass(user()?.rol!)">
            {{ getRolLabel(user()?.rol!) }}
          </span>
        </div>
      </div>
      <button (click)="logout()" class="logout-btn" title="Cerrar Sesión">
        <lucide-icon name="log-out" class="icon-md"></lucide-icon>
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT AREA
       ═══════════════════════════════════════════ -->
  <div class="main-wrapper">
    <!-- Top Navbar -->
    <header class="navbar">
      <div class="nav-left">
        <span class="breadcrumb-brand">Tukuypaj</span>
        <span class="breadcrumb-slash">/</span>
        <span class="breadcrumb-current">Panel de Control</span>
      </div>

      <!-- Status Indicator: discreto y profesional -->
      <div class="nav-right">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">Sistema Operativo</span>
        </div>
      </div>
    </header>

    <!-- Router Viewport -->
    <main class="content-viewport">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
